[main]
# We want to set up users both from here, and for normal users,
# from the GAE realm.  The only way to set up an admin user is
# from here.

shiro.loginUrl = /login

# /logout is handled by LogoutServlet (Guice), which ignores browser prefetch/
# prerender so users aren't silently logged out mid-session. It is intentionally
# NOT mapped under [urls] to a Shiro LogoutFilter.
gaeRealm = com.cilogi.shiro.gae.DatastoreRealm
discordRealm = com.cilogi.shiro.gae.DiscordRealm

passwordMatcher = org.apache.shiro.authc.credential.PasswordMatcher
iniRealm.credentialsMatcher = $passwordMatcher

securityManager.realms = $iniRealm, $gaeRealm, $discordRealm

[users]
# No bootstrap username/password admin here any more. Admins are normal accounts
# (Discord/email GaeUsers) that hold the "admin" role. Bootstrap the first admin by
# adding "admin" to that user's roles on their datastore entity; manage everyone
# else from the Members page (/users.ftl). The [roles] section below must stay so
# Shiro still creates the implicit iniRealm referenced in [main].

[roles]
admin = *
user = browse:*

[urls]
/login = authc
/settings.ftl = authc